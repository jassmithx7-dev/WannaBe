<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draft Companion — Sign In</title>
  <style>
    :root {
      --bg: #0a0e17;
      --surface: #0d1117;
      --surface2: #161b22;
      --border: #21262d;
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #3b82f6;
      --accent2: #8b5cf6;
      --danger: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(59,130,246,.09) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 20%, rgba(139,92,246,.07) 0%, transparent 50%);
    }
    .card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,.55);
    }
    .brand {
      text-align: center;
      margin-bottom: 40px;
    }
    .brand-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 26px; margin-bottom: 18px;
    }
    .brand h1 { font-size: 22px; font-weight: 700; }
    .brand p { font-size: 13px; color: var(--muted); margin-top: 5px; }

    .section-label {
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px;
    }
    .provider-btn {
      width: 100%; padding: 13px 16px;
      border-radius: 11px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      font-size: 14px; font-weight: 500;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: border-color .15s, background .15s;
      margin-bottom: 10px;
    }
    .provider-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(59,130,246,.06); }
    .provider-btn:disabled { opacity: .4; cursor: not-allowed; }
    .provider-icon {
      width: 30px; height: 30px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .provider-icon.sleeper { background: rgba(59,130,246,.15); }
    .provider-icon.yahoo  { background: rgba(139,92,246,.15); }
    .provider-chevron { margin-left: auto; color: var(--muted); font-size: 13px; transition: transform .15s; }
    .provider-btn.open .provider-chevron { transform: rotate(90deg); }
    .coming-pill {
      margin-left: auto; font-size: 10px; color: var(--muted);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 8px;
    }

    .sleeper-form {
      display: none; margin-bottom: 10px; padding: 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; margin-top: -4px;
    }
    .sleeper-form.open { display: block; }
    .input-row { display: flex; gap: 8px; }
    .input-row input {
      flex: 1; padding: 10px 13px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px;
      outline: none; transition: border-color .15s;
    }
    .input-row input:focus { border-color: var(--accent); }
    .input-row input::placeholder { color: #4b5563; }
    .btn-connect {
      padding: 10px 18px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: background .15s;
    }
    .btn-connect:hover { background: #2563eb; }
    .btn-connect:disabled { background: #1e3a5f; color: #4b5563; cursor: not-allowed; }

    .error-msg { font-size: 12px; color: var(--danger); margin-top: 8px; display: none; }
    .error-msg.show { display: block; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    .footer-note { text-align: center; font-size: 11px; color: #4b5563; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">🏈</div>
      <h1>Draft Companion</h1>
      <p>Your 2026 fantasy football command center</p>
    </div>

    <div class="section-label">Connect your account</div>

    <button class="provider-btn" id="sleeperBtn" onclick="toggleSleeperForm()">
      <div class="provider-icon sleeper">💤</div>
      <span>Continue with Sleeper</span>
      <span class="provider-chevron">›</span>
    </button>

    <div class="sleeper-form" id="sleeperForm">
      <div class="input-row">
        <input type="text" id="sleeperUsername" placeholder="Sleeper username"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button class="btn-connect" id="sleeperSubmit" onclick="signInSleeper()">Connect</button>
      </div>
      <div class="error-msg" id="sleeperError"></div>
    </div>

    <hr class="divider">

    <div class="section-label">Coming soon</div>
    <button class="provider-btn" disabled>
      <div class="provider-icon yahoo">🟣</div>
      <span>Continue with Yahoo Fantasy</span>
      <span class="coming-pill">Soon</span>
    </button>

    <p class="footer-note">No password required — connects via public fantasy API</p>
  </div>

  <script>
    // Already signed in → skip to account
    try {
      var u = JSON.parse(localStorage.getItem('dc_user') || 'null');
      if (u && u.userId) window.location.replace('account.html');
    } catch(e) {}

    function toggleSleeperForm() {
      var btn = document.getElementById('sleeperBtn');
      var form = document.getElementById('sleeperForm');
      btn.classList.toggle('open');
      form.classList.toggle('open');
      if (form.classList.contains('open')) document.getElementById('sleeperUsername').focus();
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && document.getElementById('sleeperForm').classList.contains('open')) signInSleeper();
    });

    async function signInSleeper() {
      var inp  = document.getElementById('sleeperUsername');
      var btn  = document.getElementById('sleeperSubmit');
      var err  = document.getElementById('sleeperError');
      var name = inp.value.trim();
      if (!name) return;

      btn.disabled = true; btn.textContent = '…';
      err.classList.remove('show');

      try {
        var res = await fetch('https://api.sleeper.app/v1/user/' + name);
        if (!res.ok) throw new Error('not found');
        var user = await res.json();
        if (!user || !user.user_id) throw new Error('not found');

        localStorage.setItem('dc_user', JSON.stringify({
          userId:      user.user_id,
          username:    user.username || name,
          displayName: user.display_name || user.username || name,
          avatar:      user.avatar || null,
          provider:    'sleeper'
        }));

        window.location.href = 'account.html';
      } catch(e) {
        err.textContent = 'Username not found — check your Sleeper username and try again.';
        err.classList.add('show');
        btn.disabled = false; btn.textContent = 'Connect';
      }
    }
  </script>
</body>
</html>
