<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draft Companion — Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg:       #0a0e17;
      --surface:  #0d1117;
      --surface2: #161b22;
      --border:   #21262d;
      --text:     #e6edf3;
      --muted:    #7d8590;
      --accent:   #3b82f6;
      --accent2:  #8b5cf6;
      --success:  #3fb950;
      --danger:   #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(59,130,246,.09) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 20%, rgba(139,92,246,.07) 0%, transparent 50%);
    }
    .card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 18px; padding: 44px 40px;
      width: 100%; max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,.55);
    }
    .brand { text-align: center; margin-bottom: 36px; }
    .brand-icon {
      width: 52px; height: 52px; margin: 0 auto 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px;
    }
    .brand h1 { font-size: 22px; font-weight: 700; }
    .brand p  { font-size: 13px; color: var(--muted); margin-top: 5px; }

    /* Tabs */
    .tabs { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 3px; margin-bottom: 22px; }
    .tab-btn {
      flex: 1; padding: 8px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      background: transparent; color: var(--muted); transition: background .15s, color .15s;
    }
    .tab-btn.active { background: var(--surface2); color: var(--text); }

    label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
    .field { margin-bottom: 14px; }
    input[type=email], input[type=password] {
      width: 100%; padding: 11px 13px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text); font-size: 13px;
      outline: none; transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: #4b5563; }

    .btn-primary {
      width: 100%; padding: 12px; margin-top: 4px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 9px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #1e3a5f; color: #4b5563; cursor: not-allowed; }

    .msg { font-size: 12px; margin-top: 10px; padding: 9px 12px; border-radius: 7px; display: none; }
    .msg.error   { background: rgba(248,113,113,.1); color: var(--danger); display: block; }
    .msg.success { background: rgba(63,185,80,.1);   color: var(--success); display: block; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    .provider-soon {
      width: 100%; padding: 12px 16px;
      border: 1px solid var(--border); border-radius: 10px;
      background: var(--surface); color: var(--muted);
      font-size: 13px; display: flex; align-items: center; gap: 12px;
      opacity: .45; cursor: not-allowed;
    }
    .provider-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: rgba(139,92,246,.15); }
    .coming-pill { margin-left: auto; font-size: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 2px 8px; }

    .footer-note { text-align: center; font-size: 11px; color: #4b5563; margin-top: 20px; }

    .loading-overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--muted);
    }
  </style>
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay">Checking session…</div>

  <div class="card" id="authCard" style="display:none">
    <div class="brand">
      <img src="logo.png" alt="WannaBeGms AI" style="width:130px;height:130px;object-fit:contain;display:block;margin:0 auto 14px">
      <p>Your 2026 fantasy football command center</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
      <button class="tab-btn" id="tabSignUp" onclick="switchTab('signup')">Create Account</button>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-primary" id="submitBtn" onclick="handleSubmit()">Sign In</button>
    <div class="msg" id="msg"></div>

    <hr class="divider">

    <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">Coming soon</div>
    <div class="provider-soon">
      <div class="provider-icon">🟣</div>
      <span>Continue with Yahoo Fantasy</span>
      <span class="coming-pill">Soon</span>
    </div>

    <p class="footer-note">Sessions persist — sign in once per device</p>
  </div>

  <script>
    const SUPA_URL = 'https://cbjzvazwkkpjwobiqxsf.supabase.co';
    const SUPA_KEY = 'sb_publishable_Wy-lbd-fC5ujiMI0m6SGpw_oEXnpTaj';
    const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

    var mode = 'signin';

    // Check for existing session on load
    supa.auth.getSession().then(function(result) {
      var session = result.data && result.data.session;
      if (session) {
        window.location.replace('account.html');
      } else {
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('authCard').style.display = 'block';
      }
    });

    function switchTab(m) {
      mode = m;
      document.getElementById('tabSignIn').classList.toggle('active', m === 'signin');
      document.getElementById('tabSignUp').classList.toggle('active', m === 'signup');
      document.getElementById('submitBtn').textContent = m === 'signin' ? 'Sign In' : 'Create Account';
      document.getElementById('password').autocomplete = m === 'signin' ? 'current-password' : 'new-password';
      showMsg('', '');
    }

    function showMsg(text, type) {
      var el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg' + (type ? ' ' + type : '');
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleSubmit();
    });

    async function handleSubmit() {
      var btn   = document.getElementById('submitBtn');
      var email = document.getElementById('email').value.trim();
      var pass  = document.getElementById('password').value;
      if (!email || !pass) { showMsg('Enter your email and password.', 'error'); return; }
      if (mode === 'signup' && pass.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }

      btn.disabled = true;
      btn.textContent = '…';
      showMsg('', '');

      try {
        if (mode === 'signin') {
          var r = await supa.auth.signInWithPassword({ email: email, password: pass });
          if (r.error) throw r.error;
          window.location.href = 'account.html';
        } else {
          var r = await supa.auth.signUp({ email: email, password: pass });
          if (r.error) throw r.error;
          // If email confirmation required
          if (r.data.user && !r.data.session) {
            showMsg('Account created! Check your email to confirm, then sign in.', 'success');
            switchTab('signin');
          } else {
            window.location.href = 'account.html';
          }
        }
      } catch(e) {
        showMsg(e.message || 'Something went wrong. Try again.', 'error');
      }

      btn.disabled = false;
      btn.textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
    }
  </script>
</body>
</html>
